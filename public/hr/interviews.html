<!DOCTYPE html>
<html>
<head>

    <title>Interview Scheduling</title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <link rel="stylesheet"
    href="../style.css">

</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="../index.html">
            Recruitment Management System
        </a>
    </div>
    <div class="mb-3">
    <a href="../index.html" class="btn btn-primary rounded-pill px-4 shadow-sm">
        ← Home
    </a>
</div>
</nav>


<div class="container mt-5">

    <div class="card shadow p-4">

        <h2>Schedule Interview</h2>

        <form id="interviewForm">

            <input
            type="number"
            id="candidateId"
            class="form-control mb-3"
            placeholder="Candidate ID"
            required>

            <input
            type="date"
            id="date"
            class="form-control mb-3"
            required>

            <input
            type="time"
            id="time"
            class="form-control mb-3"
            required>

            <input
            type="text"
            id="interviewer"
            class="form-control mb-3"
            placeholder="Interviewer Name"
            required>

            <button
            class="btn btn-primary">
            Schedule Interview
            </button>

        </form>

        <p
        id="message"
        class="mt-3">
        </p>

    </div>

    <div class="card shadow p-4 mt-4">

        <h3>Interview Schedule</h3>

        <button
        class="btn btn-success mb-3"
        onclick="loadInterviews()">
        Load Interviews
        </button>

        <table class="table">

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Candidate</th>
                    <th>Date</th>
                    <th>Time</th>
                    <th>Interviewer</th>

                </tr>

            </thead>

            <tbody id="interviewList">

            </tbody>

        </table>

    </div>

</div>

<script src="interviews.js"></script>

</body>
</html>
